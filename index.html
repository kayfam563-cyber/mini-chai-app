<!DOCTYPE html>
<html>
<head>
  <title>Mini Chai</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 15px;
      text-align: center;
      background: #1a1a1a;
      font-size: 20px;
      font-weight: bold;
    }

    select {
      margin-top: 8px;
      padding: 5px;
      border-radius: 8px;
    }

    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      max-width: 70%;
      padding: 10px;
      border-radius: 15px;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background: #4CAF50;
    }

    .ai {
      align-self: flex-start;
      background: #2a2a2a;
    }

    .typing {
      font-style: italic;
      opacity: 0.7;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #1a1a1a;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  Mini Chai
  <br>
  <select id="character">
    <option value="friend">Best Friend</option>
    <option value="mentor">Mentor</option>
    <option value="villain">Villain</option>
  </select>
</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");
  const character = document.getElementById("character").value;

  const msg = input.value;
  if (!msg) return;

  // user bubble
  const userBubble = document.createElement("div");
  userBubble.className = "bubble user";
  userBubble.textContent = msg;
  chat.appendChild(userBubble);

  input.value = "";

  // typing bubble
  const typingBubble = document.createElement("div");
  typingBubble.className = "bubble ai typing";
  typingBubble.textContent = "Typing...";
  chat.appendChild(typingBubble);

  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("https://mini-chai-backend.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: msg, character })
    });

    const data = await res.json();

    // remove typing
    chat.removeChild(typingBubble);

    // AI bubble
    const aiBubble = document.createElement("div");
    aiBubble.className = "bubble ai";
    aiBubble.textContent = data.reply;
    chat.appendChild(aiBubble);

    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    typingBubble.textContent = "Error talking to server";
  }
}
</script>

</body>
</html>
