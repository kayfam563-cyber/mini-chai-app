<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
  background: black;
  color: white;
  font-family: Arial;
}

/* CONTAINER */
#container {
  display: flex;
  width: 400vw;
  height: 100vh;
  transition: transform 0.3s ease;
}

.page {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;
  padding: 20px;
  box-sizing: border-box;
  overflow-y: auto;
}

/* TOP TITLE */
.title {
  text-align: center;
  font-size: 22px;
  margin-bottom: 20px;
}

/* ITEMS */
.item {
  background: #222;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

/* SEARCH */
#search {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
}

/* CHAT */
#chat {
  margin-bottom: 80px;
}

.bubble {
  padding: 10px;
  border-radius: 15px;
  margin: 10px 0;
  max-width: 70%;
}

.user {
  background: green;
  margin-left: auto;
}

.ai {
  background: #333;
}

/* INPUT */
#chatInput {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: none;
  background: #111;
  padding: 10px;
}

#chatInput input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

#chatInput button {
  margin-left: 10px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: green;
  color: white;
}

/* BOTTOM NAV */
#bottomNav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}

.navItem {
  color: gray;
}

.navActive {
  color: white;
}
</style>
</head>

<body>

<div id="container">

  <!-- CHARACTERS -->
  <div class="page">
    <div class="title">Characters</div>

    <div class="item" onclick="setCharacter('kyle')">Kyle</div>
    <div class="item" onclick="setCharacter('friend')">Best Friend</div>
    <div class="item" onclick="setCharacter('maya')">Maya</div>
  </div>

  <!-- SEARCH -->
  <div class="page">
    <div class="title">Search</div>

    <input id="search" placeholder="Search..." oninput="filterCharacters()" />

    <div class="item">Kyle</div>
    <div class="item">Best Friend</div>
    <div class="item">Maya</div>
  </div>

  <!-- CHAT -->
  <div class="page">
    <div class="title">Chat</div>

    <div id="chat"></div>
  </div>

  <!-- PROFILE -->
  <div class="page">
    <div class="title">Profile</div>
    <p>Coming soon...</p>
  </div>

</div>

<!-- INPUT -->
<div id="chatInput">
  <input id="input" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<!-- BOTTOM NAV -->
<div id="bottomNav">
  <div class="navItem navActive" onclick="goToPage(0)">Home</div>
  <div class="navItem" onclick="goToPage(1)">Search</div>
  <div class="navItem" onclick="goToPage(2)">Chat</div>
  <div class="navItem" onclick="goToPage(3)">Profile</div>
</div>

<script>
let currentPage = 0;
const totalPages = 4;
let currentCharacter = null;

/* NAVIGATION */
function goToPage(i) {
  if (i < 0 || i >= totalPages) return;

  currentPage = i;

  document.getElementById("container").style.transform =
    "translateX(-" + (i * 100) + "vw)";

  document.getElementById("chatInput").style.display =
    (i === 2 && currentCharacter) ? "flex" : "none";

  document.querySelectorAll(".navItem").forEach((el, index) => {
    el.classList.toggle("navActive", index === i);
  });
}

/* SWIPE */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if (Math.abs(diff) < 80) return;

  if (diff > 0) goToPage(currentPage + 1);
  else goToPage(currentPage - 1);
});

/* CHARACTER SELECT */
function setCharacter(char) {
  currentCharacter = char;

  document.getElementById("chat").innerHTML = "";
  goToPage(2);
}

/* SEARCH */
function filterCharacters() {
  const search = document.getElementById("search").value.toLowerCase();
  const items = document.querySelectorAll(".item");

  items.forEach(item => {
    item.style.display =
      item.textContent.toLowerCase().includes(search) ? "block" : "none";
  });
}

/* SEND MESSAGE */
async function sendMessage() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const msg = input.value.trim();
  if (!msg) return;

  chat.innerHTML += `<div class="bubble user">${msg}</div>`;
  input.value = "";

  const id = "t" + Date.now();
  chat.innerHTML += `<div id="${id}" class="bubble ai">Typing...</div>`;

  try {
    const res = await fetch("https://mini-chai-backend.onrender.com/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        message: msg,
        character: currentCharacter
      })
    });

    const data = await res.json();

    document.getElementById(id).remove();

    chat.innerHTML += `<div class="bubble ai">${data.reply}</div>`;

  } catch (err) {
    document.getElementById(id).remove();
    chat.innerHTML += `<div class="bubble ai">Error</div>`;
  }
}
</script>

</body>
</html>
