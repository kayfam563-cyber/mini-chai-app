<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🔒 LOCK SCREEN */
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  touch-action: none;
  height: 100%;
  font-family: Arial;
  background: #000;
  color: white;
}

/* 🔝 HEADER TITLE */
#headerTitle {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  text-align: center;
  font-size: 20px;
  padding: 15px 0;
  background: #111;
  font-weight: bold;
  z-index: 1000;
}

/* 🔒 CONTAINER */
#container {
  display: flex;
  width: 400vw;
  height: 100vh;
  transform: translateX(0);
  transition: transform 0.3s ease;
}

/* 🔒 PAGES */
.page {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;
  padding: 20px;
  padding-top: 70px;
  padding-bottom: 80px;
  box-sizing: border-box;
  overflow-y: auto;
}

/* ITEMS */
.item {
  background: #222;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

/* SEARCH */
#search {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
}

/* CHAT */
#chat {
  margin-bottom: 80px;
}

/* CHAT INPUT */
#chatInput {
  position: fixed;
  bottom: 60px;
  width: 100%;
  display: none;
  background: #111;
  padding: 10px;
}

#chatInput input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

#chatInput button {
  margin-left: 10px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: green;
  color: white;
}

/* CHAT BUBBLES */
.bubble {
  padding: 10px;
  border-radius: 15px;
  margin: 10px 0;
  max-width: 70%;
}

.user {
  background: green;
  margin-left: auto;
}

.ai {
  background: #333;
}

/* 🔻 BOTTOM NAV */
#bottomNav {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  z-index: 1000;
}

#bottomNav div {
  font-size: 22px;
  opacity: 0.5;
  transition: 0.2s;
}

.activeNav {
  opacity: 1 !important;
  color: white;
}

</style>
</head>

<body>

<!-- 🔝 TITLE -->
<div id="headerTitle">Characters</div>

<!-- 📱 PAGES -->
<div id="container">

  <!-- CHARACTERS -->
  <div class="page">
    <h2>Characters</h2>
    <div>
      <div class="item" onclick="setCharacter('kyle')">Kyle</div>
<div class="item" onclick="setCharacter('friend')">Best Friend</div>
<div class="item" onclick="setCharacter('maya')">Maya</div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="page">
    <input id="search" placeholder="Search characters..." oninput="filterCharacters()" />
    <div>
      <div class="item">Kyle</div>
      <div class="item">Best Friend</div>
      <div class="item">Maya</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="page">
    <h2>Chat</h2>
    <div id="chat"></div>

    <div id="chatInput">
      <input id="input" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- PROFILE -->
  <div class="page">
    <h2>Profile</h2>
    <p>Coming soon...</p>
  </div>

</div>

<!-- 🔻 NAV -->
<div id="bottomNav">
  <div onclick="goToPage(0)" id="nav0">🏠</div>
  <div onclick="goToPage(1)" id="nav1">🔍</div>
  <div onclick="goToPage(2)" id="nav2">💬</div>
  <div onclick="goToPage(3)" id="nav3">👤</div>
</div>

<script>
let currentPage = 0;
const totalPages = 4;
let currentCharacter = null;

/* 🧠 MEMORY SYSTEM */
let chats = {
  kyle: [],
  friend: [],
  maya: []
};

/* NAVIGATION */
function goToPage(i) {
  if (i < 0 || i >= totalPages) return;

  currentPage = i;

  document.getElementById("container").style.transform =
    "translateX(-" + (i * 100) + "vw)";

  // Hide input unless inside a chat
  document.getElementById("chatInput").style.display =
    (i === 2 && currentCharacter) ? "flex" : "none";
}

/* SELECT CHARACTER */
function setCharacter(char) {
  currentCharacter = char;

  goToPage(2);

  loadChat();
}

/* LOAD CHAT */
function loadChat() {
  const chatBox = document.getElementById("chat");
  chatBox.innerHTML = "";

  const messages = chats[currentCharacter];

  messages.forEach(msg => {
    chatBox.innerHTML += `
      <div class="bubble ${msg.role}">
        ${msg.text}
      </div>
    `;
  });
}

/* SEND MESSAGE */
async function sendMessage() {
  const input = document.getElementById("input");
  const msg = input.value.trim();
  if (!msg || !currentCharacter) return;

  const chatBox = document.getElementById("chat");

  // SAVE USER MESSAGE
  chats[currentCharacter].push({ role: "user", text: msg });

  chatBox.innerHTML += `<div class="bubble user">${msg}</div>`;
  input.value = "";

  // TYPING
  const id = "t" + Date.now();
  chatBox.innerHTML += `<div id="${id}" class="bubble ai">Typing...</div>`;

  try {
    const res = await fetch("https://mini-chai-backend.onrender.com/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        message: msg,
        character: currentCharacter
      })
    });

    const data = await res.json();

    document.getElementById(id).remove();

    // SAVE AI MESSAGE
    chats[currentCharacter].push({ role: "ai", text: data.reply });

    chatBox.innerHTML += `<div class="bubble ai">${data.reply}</div>`;

  } catch {
    document.getElementById(id).remove();
    chatBox.innerHTML += `<div class="bubble ai">Error</div>`;
  }
}

/* SEARCH */
function filterCharacters() {
  const search = document.getElementById("search").value.toLowerCase();
  const items = document.querySelectorAll(".item");

  items.forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(search)
      ? "block"
      : "none";
  });
}

/* SWIPE (CONTROLLED) */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if (Math.abs(diff) < 100) return;

  if (diff > 0) goToPage(currentPage + 1);
  else goToPage(currentPage - 1);
});
</script>

</body>
  </html>
