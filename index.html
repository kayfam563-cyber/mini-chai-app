<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/jpeg" href="icon.jpg">
  <link rel="apple-touch-icon" href="icon.jpg">

  <title>Mini Chai</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      max-width: 400px;
      margin: auto;
    }

    h2 {
      text-align: center;
    }

    #chat {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #444;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .user {
      text-align: right;
      margin: 5px;
    }

    .ai {
      text-align: left;
      margin: 5px;
    }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #444;
      color: white;
    }
  </style>
</head>

<body>

<h2>Mini Chai 🤖</h2>

<select id="character">
  <option value="friend">Best Friend</option>
  <option value="mentor">Mentor</option>
  <option value="villain">Villain</option>
</select>

<div id="chat"></div>

<input id="input" placeholder="Type a message..." />
<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");
  const character = document.getElementById("character").value;

  const msg = input.value;
  if (!msg) return;

  chat.innerHTML += `<p class="user"><b>You:</b> ${msg}</p>`;

  const res = await fetch("https://mini-chai-backend.onrender.com/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: msg, character })
  });

  const data = await res.json();

  chat.innerHTML += `<p class="ai"><b>AI:</b> ${data.reply}</p>`;

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
