<!DOCTYPE html>
<html>
<head>
  <title>Mini Chai</title>

  <style>
    body {
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      max-width: 400px;
      margin: auto;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      text-align: center;
      padding: 10px;
      background: #1a1a1a;
    }

    select {
      margin-top: 5px;
      padding: 5px;
      border-radius: 8px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 75%;
      word-wrap: break-word;
    }

    .user {
      background: #4CAF50;
      align-self: flex-end;
    }

    .ai {
      background: #2a2a2a;
      align-self: flex-start;
    }

    .typing {
      font-style: italic;
      opacity: 0.6;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      gap: 5px;
      background: #1a1a1a;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border-radius: 20px;
      border: none;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <h2>Mini Chai</h2>
  <select id="character">
    <option value="friend">Best Friend</option>
    <option value="mentor">Mentor</option>
    <option value="villain">Villain</option>
  </select>
</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");
  const character = document.getElementById("character").value;

  const msg = input.value.trim();
  if (!msg) return;

  // user bubble
  chat.innerHTML += `<div class="bubble user">${msg}</div>`;
  input.value = "";
  chat.scrollTop = chat.scrollHeight;

  // typing indicator
  const typingId = "typing-" + Date.now();
  chat.innerHTML += `<div id="${typingId}" class="bubble ai typing">Typing...</div>`;
  chat.scrollTop = chat.scrollHeight;

  try {
    const res = await fetch("https://mini-chai-backend.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: msg, character })
    });

    const data = await res.json();

    // remove typing
    document.getElementById(typingId).remove();

    // AI bubble
    chat.innerHTML += `<div class="bubble ai">${data.reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    document.getElementById(typingId).remove();
    chat.innerHTML += `<div class="bubble ai">Error talking to server</div>`;
  }
}
</script>

</body>
</html>
