<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🔒 LOCK SCREEN COMPLETELY */
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  touch-action: none;
  height: 100%;
  font-family: Arial;
  background: #000;
  color: white;
}

/* TOP NAV */
#navbar {
  display: flex;
  justify-content: space-around;
  background: #111;
  padding: 15px 0;
  font-weight: bold;
}

/* 🔒 CONTAINER */
#container {
  display: flex;
  width: 400vw;
  height: 100vh;
  transform: translateX(0);
  transition: transform 0.3s ease;
}

/* 🔒 PAGES */
.page {
  width: 100vw;
  height: 100vh;
  flex-shrink: 0;
  padding: 20px;
  box-sizing: border-box;
  overflow-y: auto;
}

/* ITEMS */
.item {
  background: #222;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
}

/* CHAT */
#chat {
  margin-bottom: 80px;
}

/* CHAT INPUT */
#chatInput {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: none;
  background: #111;
  padding: 10px;
}

#chatInput input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

#chatInput button {
  margin-left: 10px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: green;
  color: white;
}

/* SEARCH */
#search {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: none;
}

/* CHAT BUBBLES */
.bubble {
  padding: 10px;
  border-radius: 15px;
  margin: 10px 0;
  max-width: 70%;
}

.user {
  background: green;
  margin-left: auto;
}

.ai {
  background: #333;
}

</style>
</head>

<body>

<div id="navbar">
  <div onclick="goToPage(0)">Characters</div>
  <div onclick="goToPage(1)">Search</div>
  <div onclick="goToPage(2)">Chat</div>
  <div onclick="goToPage(3)">Profile</div>
</div>

<div id="container">

  <!-- CHARACTERS -->
  <div class="page">
    <h2>Characters</h2>
    <div id="characterList">
      <div class="item" onclick="setCharacter('kyle')">Kyle</div>
      <div class="item" onclick="setCharacter('friend')">Best Friend</div>
      <div class="item" onclick="setCharacter('maya')">Maya</div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="page">
    <input id="search" placeholder="Search characters..." oninput="filterCharacters()" />
    <div>
      <div class="item">Kyle</div>
      <div class="item">Best Friend</div>
      <div class="item">Maya</div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="page">
    <h2>Chat</h2>
    <div id="chat"></div>

    <div id="chatInput">
      <input id="input" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- PROFILE -->
  <div class="page">
    <h2>Profile</h2>
    <p>Coming soon...</p>
  </div>

</div>

<script>
let currentPage = 0;
const totalPages = 4;
let currentCharacter = "friend";

/* NAVIGATION */
function goToPage(i) {
  if (i < 0 || i >= totalPages) return;

  currentPage = i;

  const container = document.getElementById("container");
  container.style.transform = `translateX(-${i * 100}vw)`;

  const chatInput = document.getElementById("chatInput");
  chatInput.style.display = (i === 2) ? "flex" : "none";
}

/* 🔒 CLEAN SWIPE (NO DRAGGING) */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if (Math.abs(diff) < 100) return;

  if (diff > 0) goToPage(currentPage + 1);
  else goToPage(currentPage - 1);
});

/* CHARACTER */
function setCharacter(char) {
  currentCharacter = char;
  goToPage(2);
  document.getElementById("chat").innerHTML = "";
}

/* SEARCH */
function filterCharacters() {
  const search = document.getElementById("search").value.toLowerCase();
  const items = document.querySelectorAll(".item");

  items.forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(search)
      ? "block"
      : "none";
  });
}

/* SEND MESSAGE */
async function sendMessage() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const msg = input.value.trim();
  if (!msg) return;

  chat.innerHTML += `<div class="bubble user">${msg}</div>`;
  input.value = "";

  const id = "t" + Date.now();
  chat.innerHTML += `<div id="${id}" class="bubble ai">Typing...</div>`;

  try {
    const res = await fetch("https://mini-chai-backend.onrender.com/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        message: msg,
        character: currentCharacter
      })
    });

    const data = await res.json();

    document.getElementById(id).remove();
    chat.innerHTML += `<div class="bubble ai">${data.reply}</div>`;

  } catch {
    document.getElementById(id).remove();
    chat.innerHTML += `<div class="bubble ai">Error</div>`;
  }
}
</script>

</body>
</html>
