<!DOCTYPE html>
<html>
<head>
  <title>Mini Chai</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    #container {
      display: flex;
      width: 400vw;
      height: 100dvh;
      transition: transform 0.3s ease;
    }

    .page {
      width: 100vw;
      height: 100dvh;
      padding: 60px 10px 80px;
      overflow-y: auto;
    }

    h2 { text-align: center; }

    .item {
      background: #2a2a2a;
      padding: 12px;
      margin: 8px 0;
      border-radius: 12px;
      cursor: pointer;
    }

    .chat {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      padding: 10px;
      border-radius: 15px;
      max-width: 75%;
    }

    .user {
      background: #4CAF50;
      align-self: flex-end;
    }

    .ai {
      background: #2a2a2a;
      align-self: flex-start;
    }

    #nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #1a1a1a;
      padding: 10px;
      z-index: 1000;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #1a1a1a;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #4CAF50;
      color: white;
    }

    /* CHAT TABS */
    #chatTabs {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 0;
    }

    .tab {
      background: #2a2a2a;
      padding: 8px 14px;
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer;
    }

    .activeTab {
      background: #4CAF50;
    }
  </style>
</head>

<body>

<div id="nav">
  <div onclick="goToPage(0)">Characters</div>
  <div onclick="goToPage(1)">Search</div>
  <div onclick="goToPage(2)">Chat</div>
  <div onclick="goToPage(3)">Profile</div>
</div>

<div id="container">

  <!-- Characters -->
  <div class="page">
    <h2>Characters</h2>
    <div class="item" onclick="setCharacter('Kyle')">Kyle</div>
    <div class="item" onclick="setCharacter('Best Friend')">Best Friend</div>
    <div class="item" onclick="setCharacter('Maya')">Maya</div>
  </div>

  <!-- Search -->
  <div class="page">
    <h2>Search</h2>
    <input id="search" placeholder="Search..." oninput="filterCharacters()" />
    <div id="characterList">
      <div class="item" onclick="setCharacter('Kyle')">Kyle</div>
      <div class="item" onclick="setCharacter('Best Friend')">Best Friend</div>
      <div class="item" onclick="setCharacter('Maya')">Maya</div>
    </div>
  </div>

  <!-- Chat -->
  <div class="page">
    <h2>Chat</h2>

    <!-- horizontal chats -->
    <div id="chatTabs"></div>

    <!-- messages -->
    <div id="chat" class="chat"></div>
  </div>

  <!-- Profile -->
  <div class="page">
    <h2>Profile</h2>
    <div class="item">Account</div>
  </div>

</div>

<div id="inputArea">
  <input id="input" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
let currentPage = 0;
let totalPages = 4;
let currentCharacter = "friend";

/* NAV */
function goToPage(i) {
  if (i < 0 || i >= totalPages) return;
  currentPage = i;

  document.getElementById("container").style.transform =
    "translateX(-" + (i * 100) + "vw)";
}

/* SWIPE */
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;
  let diff = startX - endX;

  if (Math.abs(diff) < 80) return;

  if (diff > 0) goToPage(currentPage + 1);
  else goToPage(currentPage - 1);
});

/* CHARACTER */
function setCharacter(char) {
  currentCharacter = char;
  goToPage(2);

  document.getElementById("chat").innerHTML = "";
}

/* SEARCH */
function filterCharacters() {
  const search = document.getElementById("search").value.toLowerCase();
  const items = document.querySelectorAll("#characterList .item");

  items.forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(search)
      ? "block"
      : "none";
  });
}

/* SEND MESSAGE */
async function sendMessage() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const msg = input.value.trim();
  if (!msg) return;

  chat.innerHTML += `<div class="bubble user">${msg}</div>`;
  input.value = "";

  const id = "t" + Date.now();
  chat.innerHTML += `<div id="${id}" class="bubble ai">Typing...</div>`;

  try {
    const res = await fetch("https://mini-chai-backend.onrender.com/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        message: msg,
        character: currentCharacter
      })
    });

    const data = await res.json();

    document.getElementById(id).remove();

    chat.innerHTML += `<div class="bubble ai">${data.reply}</div>`;

  } catch {
    document.getElementById(id).remove();
    chat.innerHTML += `<div class="bubble ai">Error</div>`;
  }
}
  </script>
  
</body>
  </html>
