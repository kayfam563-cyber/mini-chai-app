<!DOCTYPE html>
<html>
<head>
  <title>Mini Chai</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 20%;
      background: #1a1a1a;
      padding: 10px;
      border-right: 1px solid #333;
      overflow-y: auto;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      padding: 10px;
      border-radius: 15px;
      max-width: 70%;
    }

    .user {
      background: #4CAF50;
      align-self: flex-end;
    }

    .ai {
      background: #2a2a2a;
      align-self: flex-start;
    }

    .inputArea {
      display: flex;
      padding: 10px;
      background: #1a1a1a;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      margin-bottom: 10px;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #4CAF50;
      color: white;
    }

    .item {
      padding: 8px;
      margin-bottom: 5px;
      background: #2a2a2a;
      border-radius: 8px;
      cursor: pointer;
    }

    .item:hover {
      background: #3a3a3a;
    }
  </style>
</head>

<body>

<!-- Characters -->
<div class="sidebar">
  <h3>Characters</h3>
  <div class="item" onclick="setCharacter('friend')">Best Friend</div>
  <div class="item" onclick="setCharacter('mentor')">Mentor</div>
  <div class="item" onclick="setCharacter('villain')">Villain</div>
</div>

<!-- Search -->
<div class="sidebar">
  <h3>Search</h3>
  <input id="search" placeholder="Search characters..." oninput="filterCharacters()" />

  <div id="characterList">
    <div class="item" onclick="setCharacter('friend')">Funny Friend</div>
    <div class="item" onclick="setCharacter('mentor')">Wise Mentor</div>
    <div class="item" onclick="setCharacter('villain')">Dark Villain</div>
    <div class="item" onclick="setCharacter('friend')">Chill Bestie</div>
  </div>
</div>

<!-- Main Chat -->
<div class="main">
  <div id="chat" class="chat"></div>

  <div class="inputArea">
    <input id="input" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- Profile -->
<div class="sidebar">
  <h3>Profile</h3>
  <div class="item">Account</div>
  <div class="item">Settings</div>
</div>

<script>
let currentCharacter = "friend";

function setCharacter(char) {
  currentCharacter = char;
}

function filterCharacters() {
  const search = document.getElementById("search").value.toLowerCase();
  const items = document.querySelectorAll("#characterList .item");

  items.forEach(item => {
    if (item.textContent.toLowerCase().includes(search)) {
      item.style.display = "block";
    } else {
      item.style.display = "none";
    }
  });
}

async function sendMessage() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const msg = input.value.trim();
  if (!msg) return;

  chat.innerHTML += `<div class="bubble user">${msg}</div>`;
  input.value = "";

  chat.scrollTop = chat.scrollHeight;

  const typingId = "typing-" + Date.now();
  chat.innerHTML += `<div id="${typingId}" class="bubble ai">Typing...</div>`;

  try {
    const res = await fetch("https://mini-chai-backend.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: msg,
        character: currentCharacter
      })
    });

    const data = await res.json();

    document.getElementById(typingId).remove();

    chat.innerHTML += `<div class="bubble ai">${data.reply}</div>`;
    chat.scrollTop = chat.scrollHeight;

  } catch {
    document.getElementById(typingId).remove();
    chat.innerHTML += `<div class="bubble ai">Error</div>`;
  }
}
</script>

</body>
  </html>
