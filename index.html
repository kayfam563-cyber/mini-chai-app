<!DOCTYPE html>
<html>
<head>
  <title>Mini Chai</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      width: 100vw;
      transition: transform 0.3s ease;
    }

    .page {
      min-width: 100vw;
      height: 100vh;
      flex-shrink: 0;
      padding: 60px 10px 70px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    h2 {
      text-align: center;
    }

    .item {
      padding: 12px;
      margin: 8px 0;
      background: #2a2a2a;
      border-radius: 12px;
      cursor: pointer;
    }

    .chat {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bubble {
      padding: 10px;
      border-radius: 15px;
      max-width: 70%;
    }

    .user {
      background: #4CAF50;
      align-self: flex-end;
    }

    .ai {
      background: #2a2a2a;
      align-self: flex-start;
    }

    #nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #1a1a1a;
      padding: 10px;
      z-index: 1000;
    }

    #inputArea {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 10px;
      background: #1a1a1a;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 20px;
      border: none;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      border-radius: 20px;
      border: none;
      background: #4CAF50;
      color: white;
    }
  </style>
</head>

<body>

<div id="nav">
  <div onclick="goToPage(0)">Characters</div>
  <div onclick="goToPage(1)">Search</div>
  <div onclick="goToPage(2)">Chat</div>
  <div onclick="goToPage(3)">Profile</div>
</div>

<div id="container" class="container">

  <div class="page">
    <h2>Characters</h2>
    <div class="item" onclick="setCharacter('friend')">Best Friend</div>
    <div class="item" onclick="setCharacter('mentor')">Mentor</div>
    <div class="item" onclick="setCharacter('villain')">Villain</div>
  </div>

  <div class="page">
    <h2>Search</h2>
    <input id="search" placeholder="Search..." oninput="filterCharacters()" />
    <div id="characterList">
      <div class="item" onclick="setCharacter('friend')">Funny Friend</div>
      <div class="item" onclick="setCharacter('mentor')">Wise Mentor</div>
      <div class="item" onclick="setCharacter('villain')">Dark Villain</div>
    </div>
  </div>

  <div class="page">
    <h2>Chat</h2>
    <div id="chat" class="chat"></div>
  </div>

  <div class="page">
    <h2>Profile</h2>
    <div class="item">Account</div>
  </div>

</div>

<div id="inputArea">
  <input id="input" placeholder="Type..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
let currentPage = 0;
let currentCharacter = "friend";

function goToPage(i) {
  currentPage = i;
  document.getElementById("container").style.transform =
    `translateX(-${i * 100}vw)`;
}

// swipe
let startX = 0;

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", e => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 50 && currentPage < 3) goToPage(currentPage + 1);
  if (endX - startX > 50 && currentPage > 0) goToPage(currentPage - 1);
});

function setCharacter(char) {
  currentCharacter = char;
  goToPage(2);
}

function filterCharacters() {
  const search = document.getElementById("search").value.toLowerCase();
  const items = document.querySelectorAll("#characterList .item");

  items.forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(search)
      ? "block"
      : "none";
  });
}

async function sendMessage() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const msg = input.value.trim();
  if (!msg) return;

  chat.innerHTML += `<div class="bubble user">${msg}</div>`;
  input.value = "";

  const id = "t" + Date.now();
  chat.innerHTML += `<div id="${id}" class="bubble ai">Typing...</div>`;

  const res = await fetch("https://mini-chai-backend.onrender.com/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({message: msg, character: currentCharacter})
  });

  const data = await res.json();
  document.getElementById(id).remove();

  chat.innerHTML += `<div class="bubble ai">${data.reply}</div>`;
}
</script>

</body>
      </html>
