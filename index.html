<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.jpg">
<link rel="apple-touch-icon" href="icon.jpg">

<title>Mini Chai</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  text-align: center;
  background: #1a1a1a;
  font-size: 18px;
  font-weight: bold;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

.bubble {
  max-width: 70%;
  padding: 10px 14px;
  margin: 6px 0;
  border-radius: 20px;
  line-height: 1.4;
}

.user {
  align-self: flex-end;
  background: #4caf50;
  color: white;
  border-bottom-right-radius: 5px;
}

.ai {
  align-self: flex-start;
  background: #2a2a2a;
  border-bottom-left-radius: 5px;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: #1a1a1a;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border-radius: 20px;
  border: none;
  background: #4caf50;
  color: white;
}

select {
  margin: 5px;
  padding: 5px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  Mini Chai 🤖
  <br>
  <select id="character">
    <option value="friend">Best Friend</option>
    <option value="mentor">Mentor</option>
    <option value="villain">Villain</option>
  </select>
</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Type a message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const bubble = document.createElement("div");

  bubble.classList.add("bubble", type);
  bubble.innerText = text;

  chat.appendChild(bubble);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("input");
  const character = document.getElementById("character").value;

  const msg = input.value;
  if (!msg) return;

  addMessage(msg, "user");
  input.value = "";

  const res = await fetch("https://mini-chai-backend.onrender.com/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message: msg, character })
  });

  const data = await res.json();
  addMessage(data.reply, "ai");
}
</script>

</body>
</html>
